<!DOCTYPE html>
<html>
<head>
  <title>Roue Secrète</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 30px;
    }

    input {
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }

    #menu {
      position: fixed;
      right: 10px;
      top: 10px;
      width: 240px;
      background: #222;
      padding: 10px;
      border-radius: 10px;
      text-align: left;
    }

    #spoiler {
      cursor: pointer;
      background: #444;
      padding: 8px;
      margin-bottom: 10px;
      text-align: center;
      border-radius: 5px;
    }

    .question {
      background: #333;
      padding: 6px;
      margin: 5px 0;
      display: flex;
      justify-content: space-between;
      border-radius: 5px;
    }

    .delete {
      color: red;
      cursor: pointer;
      font-weight: bold;
    }

    .debug {
      font-size: 12px;
      color: #aaa;
      margin-top: 10px;
      word-break: break-word;
    }
  </style>
</head>

<body>

<h1>🎯 Roue Secrète</h1>

<input id="q" placeholder="Ajoute une question...">
<br>

<button onclick="send()">Envoyer</button>
<button onclick="random()">🎲 Random</button>

<h2 id="result"></h2>

<div id="menu">
  <div id="spoiler" onclick="toggleSpoil()">SPOIL ?!</div>
  <div id="content"></div>
  <div class="debug" id="debug"></div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// ⚠️ ATTEND chargement correct du SDK
const supabaseClient = supabase.createClient(
  "https://kdajcpukpuugzzysoejf.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkYWpjcHVrcHV1Z3p6eXNvZWpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzUyMDEsImV4cCI6MjA5MjgxMTIwMX0.Yxyf3fQxlUi2epMO7y4RDVLIWhepdM9bxnSO2mjdDWg"
);

let mode = 0;

// DEBUG
function log(msg){
  document.getElementById("debug").innerText = msg;
}

// ---------------- SEND ----------------
async function send(){
  const q = document.getElementById("q").value;
  if(!q) return;

  const { error } = await supabaseClient
    .from("questions")
    .insert([{ content: q }]);

  if(error){
    log("INSERT ERROR: " + JSON.stringify(error));
    console.log(error);
  } else {
    log("INSERT OK");
  }

  document.getElementById("q").value = "";
  loadMenu();
}

// ---------------- RANDOM ----------------
async function random(){

  const { data, error } = await supabaseClient
    .from("questions")
    .select("*");

  if(error){
    log("SELECT ERROR: " + JSON.stringify(error));
    return;
  }

  if(!data || data.length === 0){
    document.getElementById("result").innerText = "Aucune question 😢";
    log("EMPTY DATABASE");
    return;
  }

  const r = data[Math.floor(Math.random() * data.length)];
  document.getElementById("result").innerText = r.content;
}

// ---------------- SPOIL ----------------
function toggleSpoil(){
  mode++;
  if(mode > 2) mode = 0;
  loadMenu();
}

// ---------------- DELETE ----------------
async function deleteQuestion(id){
  await supabaseClient
    .from("questions")
    .delete()
    .eq("id", id);

  loadMenu();
}

// ---------------- LOAD ----------------
async function loadMenu(){

  const { data, error } = await supabaseClient
    .from("questions")
    .select("*")
    .order("id", { ascending: true });

  if(error){
    log("LOAD ERROR: " + JSON.stringify(error));
    return;
  }

  let html = "";

  if(mode === 0){
    html = "<p style='text-align:center'>🔒 SPOIL ?!</p>";
  }

  if(mode === 1){
    const last = data[data.length - 1];
    if(last){
      html = `
        <div class="question">
          ${last.content}
          <span class="delete" onclick="deleteQuestion(${last.id})">❌</span>
        </div>
      `;
    }
  }

  if(mode === 2){
    data.forEach(q => {
      html += `
        <div class="question">
          ${q.content}
          <span class="delete" onclick="deleteQuestion(${q.id})">❌</span>
        </div>
      `;
    });
  }

  document.getElementById("content").innerHTML = html;
  log("Loaded: " + (data?.length ?? 0));
}

// INIT
window.onload = loadMenu;

</script>

</body>
</html>

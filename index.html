<!DOCTYPE html>
<html>
<head>
  <title>Roue Secrète</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 30px;
    }

    input {
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }

    /* MENU DROITE */
    #menu {
      position: fixed;
      right: 10px;
      top: 10px;
      width: 220px;
      background: #222;
      padding: 10px;
      border-radius: 10px;
      text-align: left;
    }

    #spoiler {
      cursor: pointer;
      background: #444;
      padding: 8px;
      margin-bottom: 10px;
      text-align: center;
      border-radius: 5px;
    }

    .question {
      background: #333;
      padding: 6px;
      margin: 5px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 5px;
    }

    .delete {
      color: red;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🎯 Roue Secrète</h1>

<input id="q" placeholder="Ajoute une question...">
<br>

<button onclick="send()">Envoyer</button>
<button onclick="random()">🎲 Random</button>

<h2 id="result"></h2>

<!-- MENU DROITE -->
<div id="menu">
  <div id="spoiler" onclick="toggleSpoil()">SPOIL ?!</div>
  <div id="content"></div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://kdajcpukpuugzzysoejf.supabase.co",
  "TON_ANON_KEY"
);

let mode = 0; // 0 hidden / 1 last / 2 all

// ENVOYER
async function send(){
  const q = document.getElementById("q").value;
  if(!q) return;

  await supabaseClient.from("questions").insert([{ content: q }]);

  document.getElementById("q").value = "";
  loadMenu();
}

// RANDOM
async function random(){
  let { data, error } = await supabaseClient
    .from("questions")
    .select("*");

  if(error || !data || data.length === 0){
    document.getElementById("result").innerText = "Aucune question 😢";
    return;
  }

  const r = data[Math.floor(Math.random() * data.length)];
  document.getElementById("result").innerText = r.content;
}

// TOGGLE SPOIL
function toggleSpoil(){
  mode++;
  if(mode > 2) mode = 0;
  loadMenu();
}

// DELETE
async function deleteQuestion(id){
  await supabaseClient.from("questions").delete().eq("id", id);
  loadMenu();
}

// CHARGER MENU
async function loadMenu(){

  let { data, error } = await supabaseClient
    .from("questions")
    .select("*")
    .order("id", { ascending: true });

  let html = "";

  if(error){
    document.getElementById("content").innerHTML = "Erreur chargement";
    return;
  }

  // MODE 0
  if(mode === 0){
    html = "<p style='text-align:center'>🔒 SPOIL ?!</p>";
  }

  // MODE 1 (dernier)
  if(mode === 1){
    const last = data[data.length - 1];
    if(last){
      html = `
        <div class="question">
          ${last.content}
          <span class="delete" onclick="deleteQuestion(${last.id})">❌</span>
        </div>
      `;
    } else {
      html = "<p>Aucune question</p>";
    }
  }

  // MODE 2 (tout)
  if(mode === 2){
    data.forEach(q => {
      html += `
        <div class="question">
          ${q.content}
          <span class="delete" onclick="deleteQuestion(${q.id})">❌</span>
        </div>
      `;
    });
  }

  document.getElementById("content").innerHTML = html;
}

// AUTO CHARGEMENT
window.onload = loadMenu;

</script>

</body>
</html>
